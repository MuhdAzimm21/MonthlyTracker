<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Data - Monthly Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1c1c1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <p>Home</p>
  </a>
  <a href="needs.html" class="nav-item">
    <span>📋</span>
    <p>Needs</p>
  </a>
  <a href="entry.html" class="fab">+</a>
  <a href="savings.html" class="nav-item">
    <span>💰</span>
    <p>Savings</p>
  </a>
  <a href="wants.html" class="nav-item">
    <span>✨</span>
    <p>Wants</p>
  </a>
</div>

<div class="container">
  <h2>Manage Data</h2>

  <!-- Salary Input -->
  <div class="card">
    <label>Monthly Salary (RM)</label>
    <input type="number" id="salary" placeholder="Enter salary" oninput="calculateSplit()">
    <div class="split">
      <p>Allocated Needs (60%): <span id="needs">RM 0</span></p>
      <p>Allocated Wants (20%): <span id="wants">RM 0</span></p>
      <p>Allocated Savings (20%): <span id="savings">RM 0</span></p>
    </div>
  </div>

  <!-- Add Expense -->
  <div class="card">
    <h3>Add / Edit Entry</h3>
    <input type="hidden" id="edit-index" value="-1">
    <input type="text" id="desc" placeholder="Description (e.g., Rent, Grocery)">
    <input type="number" id="amount" placeholder="Amount (RM)">
    <input type="date" id="dueDate">

    <select id="category">
      <option value="Needs">Needs</option>
      <option value="Wants">Wants</option>
      <option value="Savings">Savings</option>
    </select>

    <button id="add-btn" onclick="addItem()">➕ Add Item</button>
  </div>

  <!-- Data Table -->
  <div class="card" style="overflow-x: auto;">
    <h3>All Entries</h3>
    <table id="table">
      <thead>
        <tr>
          <th>Description</th>
          <th>RM</th>
          <th>Category</th>
          <th>Due Date</th>
          <th>Done / Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>
<script>
  window.addEventListener('load', () => {
    renderAll();
    calculateSplit();
  });
</script>
</body>
</html>
