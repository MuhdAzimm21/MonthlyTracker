<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Data - Monthly Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1c1c1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <p>Home</p>
  </a>
  <a href="needs.html" class="nav-item">
    <span>📋</span>
    <p>Needs</p>
  </a>
  <a href="entry.html" class="fab">+</a>
  <a href="savings.html" class="nav-item">
    <span>💰</span>
    <p>Savings</p>
  </a>
  <a href="wants.html" class="nav-item">
    <span>✨</span>
    <p>Wants</p>
  </a>
</div>

<div class="container">
  <h2>Manage Data</h2>

  <!-- Salary Input -->
  <div class="card">
    <label>Monthly Salary (RM)</label>
    <input type="number" id="salary" placeholder="Enter salary" oninput="calculateSplit()">
    <div class="split">
      <p>Allocated Needs (60%): <span id="needs">RM 0</span></p>
      <p>Allocated Wants (20%): <span id="wants">RM 0</span></p>
      <p>Allocated Savings (20%): <span id="savings">RM 0</span></p>
    </div>
  </div>

  <!-- Add Expense -->
  <div class="card">
    <h3>Add / Edit Entry</h3>
    <input type="hidden" id="edit-index" value="-1">
    <input type="text" id="desc" placeholder="Description (e.g., Rent, Grocery)">
    <input type="number" id="amount" placeholder="Amount (RM)">
    <input type="date" id="dueDate">

    <select id="category">
      <option value="Needs">Needs</option>
      <option value="Wants">Wants</option>
      <option value="Savings">Savings</option>
    </select>

    <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #252525; padding: 10px; border-radius: 8px; border: 1px solid #333;">
      <input type="checkbox" id="recurring" style="width: 20px; height: 20px; margin-top: 0;">
      <label for="recurring" style="font-size: 0.9rem; color: #aaa;">🔄 Set as Recurring (Keep for next month)</label>
    </div>

    <button id="add-btn" onclick="addItem()">➕ Add Item</button>
  </div>

  <!-- Data Table -->
  <div class="card" style="overflow-x: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h3 style="margin: 0;">All Entries</h3>
      <div style="display: flex; gap: 8px;">
        <button onclick="exportToCSV()" style="width: auto; padding: 5px 10px; font-size: 0.8rem; margin-top: 0; background: #2196F3;">📤 Export</button>
        <button onclick="document.getElementById('csv-upload').click()" style="width: auto; padding: 5px 10px; font-size: 0.8rem; margin-top: 0; background: #FF9800;">📥 Upload</button>
        <input type="file" id="csv-upload" accept=".csv" style="display: none;" onchange="importFromCSV(event)">
      </div>
    </div>
    <table id="table">
      <thead>
        <tr>
          <th>Description</th>
          <th>RM</th>
          <th>Category</th>
          <th>Due Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="app.js"></script>
<script>
  window.addEventListener('load', () => {
    renderAll();
    calculateSplit();
  });
</script>
</body>
</html>
