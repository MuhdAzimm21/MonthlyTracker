<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Monthly Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1c1c1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="bottom-nav">
  <a href="index.html" class="nav-item">
    <span>🏠</span>
    <p>Home</p>
  </a>
  <a href="needs.html" class="nav-item">
    <span>📋</span>
    <p>Needs</p>
  </a>
  <a href="entry.html" class="fab">+</a>
  <a href="savings.html" class="nav-item">
    <span>💰</span>
    <p>Savings</p>
  </a>
  <a href="wants.html" class="nav-item">
    <span>✨</span>
    <p>Wants</p>
  </a>
</div>

<div class="container">
  <h2>Financial Overview</h2>

  <!-- Health Score Section -->
  <div class="card">
    <div class="health-score-container">
      <div class="health-circle" id="health-circle">100%</div>
      <div class="health-text">
        <h4 id="health-title">Budget is Healthy</h4>
        <p id="health-desc">You are spending within your limits.</p>
      </div>
    </div>
  </div>

  <!-- Main Stats Grid -->
  <div class="dashboard-grid">
    <div class="stat-card info">
      <h3>Income</h3>
      <p id="dash-salary">RM 0</p>
    </div>
    <div class="stat-card success">
      <h3>Expenses</h3>
      <p id="dash-total">RM 0</p>
    </div>
    <div class="stat-card warning">
      <h3>Due Soon</h3>
      <p id="dash-due-soon">0 Items</p>
    </div>
  </div>

  <div class="card">
    <h3>📢 Urgent Notifications</h3>
    <div id="reminders-list">
      <!-- Reminders will be injected here -->
    </div>
  </div>

  <div class="card">
    <h3>📈 Budget Allocation</h3>
    
    <div id="budget-bars">
      <!-- Progress bars for Needs, Wants, Savings -->
      <div class="budget-item">
        <div class="budget-item-header">
          <span class="budget-item-name">Needs (<span id="perc-needs">0</span>%)</span>
          <span class="budget-item-amounts"><span id="total-needs">RM 0</span> / <span id="needs">RM 0</span></span>
        </div>
        <div class="progress-container">
          <div id="bar-needs" class="progress-bar"></div>
        </div>
      </div>

      <div class="budget-item">
        <div class="budget-item-header">
          <span class="budget-item-name">Wants (<span id="perc-wants">0</span>%)</span>
          <span class="budget-item-amounts"><span id="total-wants">RM 0</span> / <span id="wants">RM 0</span></span>
        </div>
        <div class="progress-container">
          <div id="bar-wants" class="progress-bar"></div>
        </div>
      </div>

      <div class="budget-item">
        <div class="budget-item-header">
          <span class="budget-item-name">Savings (<span id="perc-savings">0</span>%)</span>
          <span class="budget-item-amounts"><span id="total-savings">RM 0</span> / <span id="savings">RM 0</span></span>
        </div>
        <div class="progress-container">
          <div id="bar-savings" class="progress-bar"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="popup.js"></script>
<script src="app.js"></script>
<script>
  // Page specific logic for Dashboard
  window.addEventListener('load', () => {
    updateDashboard();
  });
</script>
</body>
</html>
